      PGUSER: postgres
      PGDATABASE: postgres
      PGHOST: /var/run/postgresql
      PGPORT: "5432"
    command: bash -lc "chmod +x test/run_pg_matrix.sh test/run_pg_regress.sh && test/run_pg_matrix.sh 17"
