      PGHOST: /var/run/postgresql
      PGPORT: "5432"
    command: bash -lc "chmod +x test/run_pg_matrix.sh test/run_pg_regress.sh && test/run_pg_matrix.sh 16"

  pg17:
    build:
      context: .
      dockerfile: docker/Dockerfile.pg17
